<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Routine">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Daily Routine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2230;
  --bg4: #232d3f;
  --border: #2a3548;
  --border2: #3a4a62;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #57636d;
  --amber: #f0a500;
  --amber2: #c8830a;
  --amber-dim: #1f1500;
  --teal: #00bfa5;
  --teal-dim: #001f1a;
  --blue: #58a6ff;
  --blue-dim: #0d1f33;
  --red: #f85149;
  --green: #3fb950;
  --green-dim: #0e1f0e;
  --purple: #a371f7;
  --purple-dim: #1a0f33;
  --orange: #D85A30;
  --orange-dim: #1f0d05;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  overscroll-behavior: none;
}

/* STATUS BAR SPACER */
.status-bar {
  height: calc(var(--safe-top) + 8px);
  background: var(--bg2);
  flex-shrink: 0;
}

/* TOP HEADER */
.app-header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px 14px;
  flex-shrink: 0;
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.app-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--amber); }
.header-date { font-size: 12px; color: var(--text3); margin-top: 1px; }
.header-right { text-align: right; }
.header-pct { font-size: 22px; font-weight: 300; color: var(--text); line-height: 1; }
.header-count { font-size: 11px; color: var(--text3); }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .4s ease; }

/* STREAK */
.streak-strip {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  overflow-x: auto;
}
.streak-strip::-webkit-scrollbar { display: none; }
.streak-lbl { font-size: 11px; color: var(--text3); margin-right: 4px; white-space: nowrap; }
.s-dot {
  width: 26px; height: 26px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text3);
  border: 1px solid var(--border2);
  flex-shrink: 0;
}
.s-dot.complete { background: var(--green); border-color: var(--green); color: #fff; font-size: 13px; }
.s-dot.partial { background: var(--amber-dim); border-color: var(--amber2); color: var(--amber); }
.streak-count { margin-left: auto; font-size: 11px; color: var(--green); white-space: nowrap; font-weight: 500; }

/* SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--safe-bottom) + 20px);
}
.scroll-area::-webkit-scrollbar { display: none; }

/* SECTION */
.section { margin-bottom: 18px; }
.sec-header {
  display: flex; align-items: center; gap: 8px;
  padding: 0 4px; margin-bottom: 8px;
}
.sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sec-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text3); }
.sec-prog { margin-left: auto; font-size: 10px; color: var(--text3); }

/* TASK CARD */
.task-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 14px;
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  -webkit-user-select: none;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.task-card:active { background: var(--bg3); }
.task-card.done { background: var(--bg3); border-color: var(--border); }
.task-card.done::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--green);
  border-radius: 3px 0 0 3px;
}

/* CHECKBOX */
.cb {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border2);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.cb.checked { background: var(--green); border-color: var(--green); }
.cb.checked::after {
  content: '';
  width: 6px; height: 10px;
  border: 2px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(42deg) translateY(-1px);
  display: block;
}

/* TASK INFO */
.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 15px; color: var(--text); line-height: 1.3; }
.task-card.done .task-name { color: var(--text3); text-decoration: line-through; }
.task-time {
  display: inline-block;
  font-size: 11px; color: var(--text3);
  background: var(--bg4);
  padding: 2px 8px; border-radius: 20px;
  margin-top: 4px;
}
.task-time.block { background: var(--blue-dim); color: var(--blue); }

/* TIMER BUTTON */
.tmr-btn {
  padding: 7px 12px;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s;
}
.tmr-btn:active { background: var(--amber-dim); color: var(--amber); border-color: var(--amber2); }
.tmr-btn.running { background: var(--amber-dim); color: var(--amber); border-color: var(--amber2); }

/* RESET BUTTON */
.reset-wrap { padding: 8px 4px 4px; display: flex; justify-content: flex-end; }
.reset-btn {
  padding: 7px 16px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 20px;
  color: var(--text3);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
}
.reset-btn:active { background: var(--bg3); }

/* ── TIMER MODAL ─────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 480px;
  padding: 20px 24px calc(var(--safe-bottom) + 28px);
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 24px; }
.timer-face {
  font-size: 72px; font-weight: 300;
  font-family: 'DM Serif Display', serif;
  color: var(--text);
  text-align: center;
  letter-spacing: 3px;
  line-height: 1;
  margin-bottom: 8px;
}
.timer-face.running { color: var(--amber); }
.timer-phase { text-align: center; font-size: 13px; color: var(--text3); min-height: 20px; margin-bottom: 24px; }

/* POMO CONFIG */
.pomo-cfg { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
.cfg-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.cfg-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
.cfg-input {
  width: 56px; padding: 8px 4px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 16px;
  text-align: center; outline: none;
}
.cfg-input:focus { border-color: var(--amber); }

/* SESSION DOTS */
.session-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
.session-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--border2); }
.session-dot.done { background: var(--green); }
.session-dot.active { background: var(--amber); }

/* CONTROLS */
.ctrl-row { display: flex; gap: 10px; }
.ctrl-btn {
  flex: 1; padding: 14px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  cursor: pointer; border: none;
  transition: opacity .15s;
}
.ctrl-btn:active { opacity: .8; }
.ctrl-primary { background: var(--amber); color: #000; }
.ctrl-secondary { background: var(--bg4); color: var(--text2); }
.ctrl-close {
  width: 100%; padding: 12px;
  background: none; border: 1px solid var(--border2);
  border-radius: 14px; color: var(--text3);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  cursor: pointer; margin-top: 10px;
}
.ctrl-close:active { background: var(--bg3); }
</style>
</head>
<body>

<div class="status-bar"></div>

<div class="app-header">
  <div class="header-row">
    <div>
      <div class="app-title">Command</div>
      <div class="header-date" id="hdr-date"></div>
    </div>
    <div class="header-right">
      <div class="header-pct" id="hdr-pct">0%</div>
      <div class="header-count" id="hdr-count">0 / 0</div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="streak-strip" id="streak-strip"></div>

<div class="scroll-area" id="scroll-area"></div>

<!-- TIMER MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-sub" id="m-sub"></div>
    <div class="timer-face" id="m-face">00:00</div>
    <div class="timer-phase" id="m-phase"></div>
    <div id="m-pomo-cfg"></div>
    <div class="session-row" id="m-sessions"></div>
    <div class="ctrl-row">
      <button class="ctrl-btn ctrl-primary" id="m-start" onclick="timerStartPause()">Start</button>
      <button class="ctrl-btn ctrl-secondary" onclick="timerReset()">Reset</button>
    </div>
    <button class="ctrl-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SK = 'routine_pwa_v1';

const TASKS = [
  {id:1,  sec:'morning', name:'Wake up',                           time:'6:00 AM'},
  {id:2,  sec:'morning', name:'5-min stretch session',             time:'6:02 AM',  timer:{type:'cd',  dur:300,  label:'Stretch Timer', sub:'5 minutes'}},
  {id:3,  sec:'morning', name:'50 push-ups',                       time:'6:08 AM'},
  {id:4,  sec:'morning', name:'Eat breakfast',                     time:'6:15 AM'},
  {id:5,  sec:'morning', name:'Cold shower',                       time:'6:35 AM'},
  {id:6,  sec:'morning', name:'Brush teeth, Waterpik & mouthwash', time:'6:50 AM'},
  {id:7,  sec:'morning', name:'Get dressed for Copper & gym',      time:'6:55 AM'},
  {id:8,  sec:'work',    name:'Deep work block #1',                time:'7:00–10:00 AM', block:true, timer:{type:'pomo', label:'Deep Work #1', sub:'7:00 – 10:00 AM'}},
  {id:9,  sec:'active',  name:'Walk Copper — 3 miles',             time:'10:00–11:00 AM', block:true},
  {id:10, sec:'active',  name:'Run to the gym',                    time:'11:00 AM'},
  {id:11, sec:'active',  name:'1-hour workout at gym',             time:'11:10 AM–12:10 PM', block:true, timer:{type:'cd', dur:3600, label:'Gym Timer', sub:'60 minutes'}},
  {id:12, sec:'active',  name:'Run home from gym',                 time:'12:10 PM'},
  {id:13, sec:'midday',  name:'Lunch',                             time:'12:30–1:30 PM', block:true},
  {id:14, sec:'midday',  name:'Cold shower',                       time:'~1:20 PM'},
  {id:15, sec:'work',    name:'Deep work block #2',                time:'1:30–4:30 PM', block:true, timer:{type:'pomo', label:'Deep Work #2', sub:'1:30 – 4:30 PM'}},
  {id:16, sec:'evening', name:'Brush teeth, Waterpik & mouthwash', time:'~9:30 PM'},
  {id:17, sec:'evening', name:'In bed',                            time:'10:00 PM'},
];

const SECS = {
  morning: {name:'Morning routine',    color:'#EF9F27'},
  work:    {name:'Work & deep focus',  color:'#58a6ff'},
  active:  {name:'Movement & gym',     color:'#00bfa5'},
  midday:  {name:'Midday',             color:'#D85A30'},
  evening: {name:'Evening',            color:'#a371f7'},
};
const SEC_ORDER = ['morning','work','active','midday','evening'];

function todayKey(){ return new Date().toISOString().slice(0,10); }
function loadST(){ try{ const r=localStorage.getItem(SK); if(r) return JSON.parse(r); }catch(e){} return {history:{}}; }
function saveST(){ try{ localStorage.setItem(SK, JSON.stringify(ST)); }catch(e){} }
let ST = loadST();
if(!ST.history) ST.history = {};

function todayDone(){ return ST.history[todayKey()]||{}; }
function setDone(id,val){ const d=todayKey(); if(!ST.history[d]) ST.history[d]={}; ST.history[d][id]=val; saveST(); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){
  const done = todayDone();
  const total = TASKS.length;
  const doneN = Object.values(done).filter(Boolean).length;
  const pct = total ? Math.round(doneN/total*100) : 0;
  const n = new Date();

  document.getElementById('hdr-date').textContent = DAYS[n.getDay()]+', '+MONTHS[n.getMonth()]+' '+n.getDate();
  document.getElementById('hdr-pct').textContent = pct+'%';
  document.getElementById('hdr-count').textContent = doneN+' / '+total+' done';
  document.getElementById('prog-fill').style.width = pct+'%';

  renderStreak();

  const area = document.getElementById('scroll-area');
  let html = '';
  SEC_ORDER.forEach(sec => {
    const tasks = TASKS.filter(t => t.sec === sec);
    if(!tasks.length) return;
    const s = SECS[sec];
    const secDone = tasks.filter(t => done[t.id]).length;
    html += `<div class="section">
      <div class="sec-header">
        <div class="sec-dot" style="background:${s.color}"></div>
        <div class="sec-name">${s.name}</div>
        <div class="sec-prog">${secDone}/${tasks.length}</div>
      </div>`;
    tasks.forEach(t => {
      const isDone = !!done[t.id];
      const isRunning = activeTimer && activeTimer.taskId === t.id && TM.running;
      html += `<div class="task-card ${isDone?'done':''}" onclick="toggleTask(${t.id})">
        <div class="cb ${isDone?'checked':''}"></div>
        <div class="task-info">
          <div class="task-name">${t.name}</div>
          ${t.time ? `<div class="task-time ${t.block?'block':''}">${t.time}</div>` : ''}
        </div>
        ${t.timer ? `<button class="tmr-btn ${isRunning?'running':''}" onclick="openTimer(event,${t.id})">${isRunning ? fmtTime(TM.remaining) : t.timer.type==='pomo' ? 'Pomodoro' : 'Timer'}</button>` : ''}
      </div>`;
    });
    html += `</div>`;
  });
  html += `<div class="reset-wrap"><button class="reset-btn" onclick="resetDay()">Reset today</button></div>`;
  area.innerHTML = html;
}

function renderStreak(){
  const strip = document.getElementById('streak-strip');
  const today = new Date();
  const days = [];
  for(let i=6;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); days.push(d.toISOString().slice(0,10)); }
  let streak=0;
  for(let i=days.length-1;i>=0;i--){
    const pct=TASKS.length ? Math.round(Object.values(ST.history[days[i]]||{}).filter(Boolean).length/TASKS.length*100) : 0;
    if(pct===100) streak++; else break;
  }
  const dl=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let h = '<div class="streak-lbl">Streak</div>';
  days.forEach(d => {
    const pct=TASKS.length ? Math.round(Object.values(ST.history[d]||{}).filter(Boolean).length/TASKS.length*100) : 0;
    const dow=new Date(d+'T12:00').getDay();
    const cls=pct===100?'complete':pct>0?'partial':'';
    h += `<div class="s-dot ${cls}">${pct===100?'✓':dl[dow]}</div>`;
  });
  if(streak>0) h += `<div class="streak-count">${streak} day${streak>1?'s':''} 🔥</div>`;
  strip.innerHTML = h;
}

function toggleTask(id){ const d=todayDone(); setDone(id,!d[id]); renderAll(); }
function resetDay(){ ST.history[todayKey()]={}; saveST(); renderAll(); }

// ── TIMER ENGINE ──────────────────────────────────────────────────────────────
let TM = { interval:null, running:false, remaining:0, total:0, type:'cd', pomo:{work:25,shortBreak:5,longBreak:15,session:0,phase:'work'} };
let activeTimer = null;

function fmtTime(s){ const m=Math.floor(s/60), ss=s%60; return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0'); }

function openTimer(e, taskId){
  e.stopPropagation();
  const task = TASKS.find(t=>t.id===taskId);
  if(!task||!task.timer) return;
  if(activeTimer && activeTimer.taskId !== taskId){ timerStop(); }
  activeTimer = { taskId };
  TM.type = task.timer.type;
  document.getElementById('m-title').textContent = task.timer.label;
  document.getElementById('m-sub').textContent = task.timer.sub||'';
  if(TM.type==='cd'){
    if(!TM.running || activeTimer.taskId !== taskId){ TM.remaining=task.timer.dur; TM.total=task.timer.dur; }
    document.getElementById('m-pomo-cfg').innerHTML='';
    document.getElementById('m-sessions').innerHTML='';
    document.getElementById('m-phase').textContent='';
  } else {
    if(!TM.running){ TM.pomo={work:25,shortBreak:5,longBreak:15,session:0,phase:'work'}; TM.remaining=25*60; TM.total=25*60; }
    renderPomoCfg();
    renderSessions();
    document.getElementById('m-phase').textContent = TM.pomo.phase==='work'?'Focus':'Break';
  }
  updateFace();
  document.getElementById('m-start').textContent = TM.running ? 'Pause' : 'Start';
  document.getElementById('modal-overlay').classList.add('open');
}

function renderPomoCfg(){
  const p = TM.pomo;
  document.getElementById('m-pomo-cfg').innerHTML=`<div class="pomo-cfg">
    <div class="cfg-item"><div class="cfg-label">Focus</div><input class="cfg-input" id="cfg-w" type="number" min="1" max="90" value="${p.work}" oninput="cfgChange()"></div>
    <div class="cfg-item"><div class="cfg-label">Break</div><input class="cfg-input" id="cfg-s" type="number" min="1" max="30" value="${p.shortBreak}" oninput="cfgChange()"></div>
    <div class="cfg-item"><div class="cfg-label">Long</div><input class="cfg-input" id="cfg-l" type="number" min="5" max="60" value="${p.longBreak}" oninput="cfgChange()"></div>
  </div>`;
}
function cfgChange(){
  if(TM.running) return;
  TM.pomo.work=parseInt(document.getElementById('cfg-w').value)||25;
  TM.pomo.shortBreak=parseInt(document.getElementById('cfg-s').value)||5;
  TM.pomo.longBreak=parseInt(document.getElementById('cfg-l').value)||15;
  if(TM.pomo.phase==='work'){ TM.remaining=TM.pomo.work*60; TM.total=TM.pomo.work*60; }
  updateFace();
}
function renderSessions(){
  let h='';
  for(let i=0;i<4;i++){ const c=i<TM.pomo.session?'done':i===TM.pomo.session&&TM.pomo.phase==='work'?'active':''; h+=`<div class="session-dot ${c}"></div>`; }
  document.getElementById('m-sessions').innerHTML=h;
}
function updateFace(){
  const face = document.getElementById('m-face');
  face.textContent = fmtTime(TM.remaining);
  face.className = 'timer-face' + (TM.running?' running':'');
}

function timerStartPause(){ TM.running ? timerStop() : timerStart(); }
function timerStart(){
  TM.running=true;
  document.getElementById('m-start').textContent='Pause';
  document.getElementById('m-face').classList.add('running');
  TM.interval = setInterval(()=>{
    TM.remaining--;
    updateFace();
    if(TM.type==='pomo') renderSessions();
    renderTimerBtns();
    if(TM.remaining<=0) timerTick();
  },1000);
}
function timerStop(){
  clearInterval(TM.interval); TM.running=false;
  document.getElementById('m-start').textContent='Start';
  document.getElementById('m-face').classList.remove('running');
}
function timerReset(){
  timerStop();
  if(TM.type==='cd'){ const task=TASKS.find(t=>activeTimer&&t.id===activeTimer.taskId); if(task) TM.remaining=task.timer.dur; }
  else { TM.pomo.session=0; TM.pomo.phase='work'; TM.remaining=TM.pomo.work*60; TM.total=TM.pomo.work*60; document.getElementById('m-phase').textContent='Focus'; renderSessions(); }
  updateFace();
}
function timerTick(){
  timerStop();
  if(TM.type==='cd'){ document.getElementById('m-phase').textContent='Done! ✓'; return; }
  const p=TM.pomo;
  if(p.phase==='work'){
    p.session++;
    if(p.session>=4){ p.phase='long'; TM.remaining=p.longBreak*60; document.getElementById('m-phase').textContent='Long break — well earned!'; }
    else { p.phase='short'; TM.remaining=p.shortBreak*60; document.getElementById('m-phase').textContent='Short break'; }
  } else {
    if(p.phase==='long'){ p.session=0; }
    p.phase='work'; TM.remaining=p.work*60; document.getElementById('m-phase').textContent='Focus session';
  }
  renderSessions(); updateFace();
}
function renderTimerBtns(){ /* live update timer button text */ if(!activeTimer||!TM.running) return; const btn=document.querySelector(`.task-card [onclick*="${activeTimer.taskId}"]`); if(btn) btn.textContent=fmtTime(TM.remaining); }

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); renderAll(); }
function handleOverlayClick(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }

renderAll();
</script>
</body>
